name: Validate Registry

on:
  pull_request:
    paths:
      - 'skills.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON
        run: |
          python3 -c "
          import json, sys
          with open('skills.json') as f:
            data = json.load(f)
          if not isinstance(data, list):
            print('ERROR: must be an array')
            sys.exit(1)
          names = set()
          for i, entry in enumerate(data):
            for field in ['name','desc','tags','status','license','path']:
              if field not in entry:
                print(f'ERROR entry {i}: missing {field}')
                sys.exit(1)
            if entry['name'] in names:
              print(f'ERROR: duplicate name {entry[\"name\"]}')
              sys.exit(1)
            names.add(entry['name'])
            if entry['status'] not in ('curated','experimental','community'):
              print(f'ERROR entry {i}: invalid status {entry[\"status\"]}')
              sys.exit(1)
          print(f'Valid: {len(data)} skills')
          "
